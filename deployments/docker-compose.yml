services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  limiter-1:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - CONFIG_PATH=/etc/ratelimiter/rules.yaml
    volumes:
      - ../configs/rules.docker.yaml:/etc/ratelimiter/rules.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  limiter-2:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    volumes:
      - ../configs/rules.docker.yaml:/etc/ratelimiter/rules.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  limiter-3:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    volumes:
      - ../configs/rules.docker.yaml:/etc/ratelimiter/rules.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - limiter-1
      - limiter-2
      - limiter-3
